name: CI-CD Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-tests:
    name: Backend Mocha Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI_TEST: mongodb://127.0.0.1:27017/mern_todos_test
      JWT_SECRET: ci-test-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Run backend tests
        run: npm test
        working-directory: backend

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend

  selenium-e2e:
    name: Selenium E2E
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/mern_todos_ci
      JWT_SECRET: ci-test-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Run Selenium E2E test
        run: npm run test:e2e

  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/mern_todos_ci
      JWT_SECRET: ci-test-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Install k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: "0.55.0"
      - name: Run load test (Grafana Cloud)
        if: ${{ secrets.K6_CLOUD_TOKEN != '' }}
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
        run: npm run test:load:cloud
      - name: Run load test (Local fallback)
        if: ${{ secrets.K6_CLOUD_TOKEN == '' }}
        run: npm run test:load
      - name: Upload k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: k6-summary.json
          if-no-files-found: ignore

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [backend-tests, frontend-build, selenium-e2e, load-test]
    runs-on: ubuntu-latest
    steps:
      - name: Deployment gate passed
        run: echo "All quality checks passed."
